services:
  db:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network

  pgadmin:
    image: dpage/pgadmin4:9.12
    container_name: pgadmin4
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGDATA: ${PGADMIN_DATA}
    ports:
      - "15432:80"
    networks:
      - ecommerce-network

  app:
    build: .
    container_name: ecommerce-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      BOOTSTRAP_SERVER_URI: ${BOOTSTRAP_SERVER_URI}
    depends_on:
      db:
        condition: service_started
    networks:
      - ecommerce-network

  notification-service:
    build:
      context: ../notification-service (1)/notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    depends_on:
      - kafka
    environment:
      SMTP_EMAIL_USERNAME: ${SMTP_EMAIL_USERNAME}
      SMTP_EMAIL_PASSWORD: ${SMTP_EMAIL_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${BOOTSTRAP_SERVER_URI}
    networks:
      - ecommerce-network
    ports:
      - "8081:8081"

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092

      # Mapear protocolos
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    networks:
      - ecommerce-network

volumes:
  postgres_data:
  kafka_data:

networks:
  ecommerce-network:
    driver: bridge
