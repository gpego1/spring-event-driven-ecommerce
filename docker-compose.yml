services:
  db:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network

  pgadmin:
    image: dpage/pgadmin4:9.12
    container_name: pgadmin4
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGDATA: ${PGADMIN_DATA}
    ports:
      - "15432:80"
    networks:
      - ecommerce-network

  app:
    build: .
    container_name: ecommerce-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      BOOTSTRAP_SERVERS: ${BOOTSTRAP_SERVERS}
    depends_on:
      db:
        condition: service_started
    networks:
      - ecommerce-network

  notification-service:
    build:
      context: ${NOTIFICATION_SERVICE_API}
      dockerfile: Dockerfile
    container_name: notification-service
    depends_on:
      kafka:
        condition: service_started
    environment:
      SMTP_EMAIL_USERNAME: ${SMTP_EMAIL_USERNAME}
      SMTP_EMAIL_PASSWORD: ${SMTP_EMAIL_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${BOOTSTRAP_SERVER_URI}
      SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET: ${SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET}
    networks:
      - ecommerce-network
    ports:
      - "8081:8081"

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG4J_LOGGERS: "kafka.controller=ERROR,kafka.server=ERROR"
    networks:
      - ecommerce-network

volumes:
  postgres_data:
  kafka_data:

networks:
  ecommerce-network:
    driver: bridge
